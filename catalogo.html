<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAIZEN - Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --vinho: #6B1A2A; --vinho-dark: #4A0F1C; --vinho-light: #8B2A3E;
    --gold: #C9A84C; --gold-light: #E8C96A; --gold-pale: #F5E6B8;
    --cream: #F8F3E8; --dark: #1A0A0F; --text: #2C1A20; --text-light: #6B4D55;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
  .cover { min-height: 100vh; background: linear-gradient(135deg, var(--dark) 0%, var(--vinho-dark) 50%, var(--dark) 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .cover::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 50%, rgba(201,168,76,0.12) 0%, transparent 70%); }
  .cover-logo { width: 280px; height: 280px; border-radius: 50%; object-fit: cover; border: 3px solid var(--gold); box-shadow: 0 0 60px rgba(201,168,76,0.3); position: relative; z-index: 1; animation: glow 3s ease-in-out infinite alternate; }
  @keyframes glow { from { box-shadow: 0 0 40px rgba(201,168,76,0.2); } to { box-shadow: 0 0 80px rgba(201,168,76,0.5); } }
  .cover-title { font-family: 'Cinzel', serif; color: var(--gold-light); font-size: 2.8rem; font-weight: 700; letter-spacing: 0.15em; margin-top: 2.5rem; position: relative; z-index: 1; }
  .cover-subtitle { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.4rem; letter-spacing: 0.3em; margin-top: 0.5rem; position: relative; z-index: 1; text-transform: uppercase; }
  .cover-date { color: rgba(201,168,76,0.5); font-size: 0.85rem; letter-spacing: 0.2em; margin-top: 1rem; position: relative; z-index: 1; text-transform: uppercase; }
  .cover-divider { width: 200px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 1.5rem auto; position: relative; z-index: 1; }
  .cover-scroll { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); color: var(--gold); font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; z-index: 1; animation: bounce 2s infinite; }
  @keyframes bounce { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(8px); } }
  .catalog { display: none; background: var(--cream); }
  .catalog.active { display: block; }
  .catalog-header { background: linear-gradient(135deg, var(--vinho-dark), var(--vinho)); padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(107,26,42,0.4); }
  .catalog-header-inner { display: flex; align-items: center; justify-content: space-between; max-width: 1200px; margin: 0 auto; }
  .header-logo { display: flex; align-items: center; gap: 0.75rem; }
  .header-logo img { width: 48px; height: 48px; border-radius: 50%; border: 1.5px solid var(--gold); object-fit: cover; }
  .header-brand { font-family: 'Cinzel', serif; color: var(--gold-light); font-size: 1.3rem; font-weight: 600; letter-spacing: 0.1em; }
  .header-title { font-family: 'Cinzel', serif; color: white; font-size: 1.1rem; letter-spacing: 0.2em; text-transform: uppercase; }
  .cart-btn { background: var(--gold); color: var(--dark); border: none; padding: 0.6rem 1.2rem; border-radius: 4px; font-family: 'Jost', sans-serif; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; }
  .cart-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
  .cart-count { background: var(--vinho); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; font-weight: 700; }
  .catalog-body { max-width: 1200px; margin: 0 auto; padding: 2.5rem 1.5rem; }
  .section-title { font-family: 'Cinzel', serif; font-size: 1.6rem; color: var(--vinho); text-align: center; letter-spacing: 0.15em; margin-bottom: 0.5rem; }
  .section-divider { width: 120px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 0 auto 2.5rem; }
  .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
  @media (max-width: 768px) { .products-grid { grid-template-columns: repeat(2, 1fr); } }
  .product-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 12px rgba(107,26,42,0.08); transition: all 0.3s ease; cursor: pointer; border: 1px solid rgba(201,168,76,0.15); }
  .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(107,26,42,0.18); border-color: var(--gold); }
  .product-img-wrap { position: relative; aspect-ratio: 1; overflow: hidden; background: #f5f0ea; }
  .product-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
  .product-card:hover .product-img { transform: scale(1.05); }
  .variants-badge { position: absolute; top: 8px; right: 8px; background: var(--vinho); color: var(--gold-pale); font-size: 0.65rem; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
  .product-info { padding: 1rem; }
  .product-name { font-size: 0.82rem; color: var(--text); line-height: 1.4; height: 2.3em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 0.6rem; }
  .product-price { font-family: 'Cinzel', serif; font-size: 0.95rem; color: var(--vinho); font-weight: 600; }
  .product-price span { font-size: 0.75rem; color: var(--text-light); font-family: 'Jost', sans-serif; font-weight: 400; margin-left: 4px; }
  .product-moq { font-size: 0.72rem; color: var(--text-light); margin-top: 0.25rem; }
  .product-footer { padding: 0.75rem 1rem; border-top: 1px solid rgba(201,168,76,0.15); display: flex; align-items: center; justify-content: space-between; }
  .view-variants-btn { font-size: 0.72rem; color: var(--gold); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .view-variants-btn::after { content: '→'; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,10,15,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); }
  .modal-overlay.active { display: flex; }
  .modal { background: white; border-radius: 12px; max-width: 860px; width: 100%; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.5); animation: modalIn 0.3s ease; }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .modal-header { background: linear-gradient(135deg, var(--vinho-dark), var(--vinho)); padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: 'Cinzel', serif; color: var(--gold-light); font-size: 0.95rem; letter-spacing: 0.05em; flex: 1; padding-right: 1rem; }
  .modal-close { background: rgba(255,255,255,0.1); border: 1px solid rgba(201,168,76,0.3); color: var(--gold); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .modal-body { overflow-y: auto; padding: 1.5rem; flex: 1; }
  .modal-product-info { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(201,168,76,0.2); }
  .modal-main-img { width: 140px; height: 140px; object-fit: cover; border-radius: 8px; flex-shrink: 0; border: 1px solid rgba(201,168,76,0.2); }
  .modal-product-details h3 { font-size: 0.95rem; color: var(--text); line-height: 1.5; margin-bottom: 0.75rem; }
  .modal-price-range { font-family: 'Cinzel', serif; color: var(--vinho); font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem; }
  .modal-moq { font-size: 0.78rem; color: var(--text-light); margin-bottom: 0.5rem; }
  .modal-variants-title { font-family: 'Cinzel', serif; font-size: 0.9rem; color: var(--vinho); margin-bottom: 1rem; letter-spacing: 0.05em; }
  .variants-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.75rem; }
  .variant-card { border: 1.5px solid rgba(201,168,76,0.2); border-radius: 8px; overflow: hidden; transition: all 0.2s; cursor: pointer; background: white; }
  .variant-card:hover { border-color: var(--gold); box-shadow: 0 2px 12px rgba(201,168,76,0.2); }
  .variant-card.selected { border-color: var(--vinho); background: rgba(107,26,42,0.04); }
  .variant-card.out-of-stock { opacity: 0.45; cursor: not-allowed; }
  .variant-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #f5f0ea; }
  .variant-info { padding: 0.5rem; }
  .variant-code { font-weight: 600; font-size: 0.72rem; color: var(--vinho); }
  .variant-price { font-size: 0.8rem; color: var(--text); font-weight: 500; margin-top: 1px; }
  .variant-stock { font-size: 0.65rem; color: var(--text-light); margin-top: 1px; }
  .variant-stock.low { color: #C0392B; }
  .variant-qty { display: flex; align-items: center; gap: 4px; margin-top: 0.4rem; }
  .qty-btn { background: var(--vinho); color: white; border: none; width: 20px; height: 20px; border-radius: 3px; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; }
  .qty-input { width: 32px; text-align: center; border: 1px solid rgba(201,168,76,0.3); border-radius: 3px; font-size: 0.75rem; padding: 2px; font-family: 'Jost', sans-serif; }
  .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid rgba(201,168,76,0.2); display: flex; justify-content: flex-end; background: #fdf9f2; }
  .btn-add-cart { background: var(--vinho); color: var(--gold-pale); border: none; padding: 0.7rem 1.5rem; border-radius: 6px; font-family: 'Jost', sans-serif; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
  .btn-add-cart:hover { background: var(--vinho-light); transform: translateY(-1px); }
  .cart-panel { display: none; position: fixed; right: 0; top: 0; bottom: 0; width: 380px; background: white; z-index: 2000; box-shadow: -4px 0 30px rgba(0,0,0,0.2); flex-direction: column; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .cart-panel.active { display: flex; }
  .cart-header { background: linear-gradient(135deg, var(--vinho-dark), var(--vinho)); padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  .cart-header h3 { font-family: 'Cinzel', serif; color: var(--gold-light); font-size: 1rem; letter-spacing: 0.1em; }
  .cart-close { background: none; border: none; color: var(--gold); font-size: 1.2rem; cursor: pointer; }
  .cart-items { flex: 1; overflow-y: auto; padding: 1rem; }
  .cart-item { display: flex; gap: 0.75rem; padding: 0.75rem 0; border-bottom: 1px solid rgba(201,168,76,0.15); }
  .cart-item-img { width: 52px; height: 52px; object-fit: cover; border-radius: 6px; border: 1px solid rgba(201,168,76,0.2); }
  .cart-item-info { flex: 1; }
  .cart-item-code { font-weight: 600; font-size: 0.8rem; color: var(--vinho); }
  .cart-item-product { font-size: 0.72rem; color: var(--text-light); line-height: 1.3; margin-top: 2px; }
  .cart-item-price { font-size: 0.82rem; color: var(--text); font-weight: 500; margin-top: 4px; }
  .cart-item-remove { background: none; border: none; color: #ccc; cursor: pointer; font-size: 0.9rem; padding: 0 4px; }
  .cart-item-remove:hover { color: var(--vinho); }
  .cart-empty { text-align: center; padding: 3rem 1rem; color: var(--text-light); font-size: 0.85rem; }
  .cart-footer { padding: 1rem 1.5rem; border-top: 1px solid rgba(201,168,76,0.2); background: #fdf9f2; }
  .cart-total { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .cart-total-label { font-family: 'Cinzel', serif; font-size: 0.85rem; color: var(--text-light); letter-spacing: 0.05em; }
  .cart-total-value { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--vinho); font-weight: 600; }
  .whatsapp-btn { width: 100%; background: #25D366; color: white; border: none; padding: 0.85rem; border-radius: 8px; font-family: 'Jost', sans-serif; font-weight: 700; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.2s; }
  .whatsapp-btn:hover { background: #20BA5A; transform: translateY(-1px); }
  .no-variants-msg { text-align: center; padding: 2rem; color: var(--text-light); font-size: 0.85rem; font-style: italic; }
</style>
</head>
<body>
<div class="cover" id="cover">
  <img src="https://i.imgur.com/pJp0RRF.jpeg" alt="KAIZEN" class="cover-logo" onerror="this.style.display='none'">
  <div class="cover-divider"></div>
  <div class="cover-title">KAIZEN</div>
  <div class="cover-subtitle">Catálogo</div>
  <div class="cover-date">13 de marzo de 2026</div>
  <div class="cover-scroll" onclick="showCatalog()">&#9660; Ver Catálogo</div>
</div>
<div class="catalog" id="catalog">
  <div class="catalog-header">
    <div class="catalog-header-inner">
      <div class="header-logo">
        <img src="https://i.imgur.com/Ult42iF.jpeg" alt="KAIZEN" onerror="this.style.display='none'">
        <span class="header-brand">KAIZEN</span>
      </div>
      <div class="header-title">Catálogo</div>
      <button class="cart-btn" onclick="toggleCart()">
        &#128722; Carrito <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </div>
  <div class="catalog-body">
    <h2 class="section-title">CATÁLOGO</h2>
    <div class="section-divider"></div>
    <div class="products-grid" id="productsGrid"></div>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModalDirect()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="modal-product-info">
        <img class="modal-main-img" id="modalImg" src="" alt="">
        <div class="modal-product-details">
          <h3 id="modalDesc"></h3>
          <div class="modal-price-range" id="modalPrice"></div>
          <div class="modal-moq" id="modalMoq"></div>
        </div>
      </div>
      <div class="modal-variants-title">VARIANTES DISPONIBLES</div>
      <div class="variants-grid" id="variantsGrid"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-add-cart" onclick="addSelectedToCart()">+ Agregar al carrito</button>
    </div>
  </div>
</div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h3>MI PEDIDO</h3>
    <button class="cart-close" onclick="toggleCart()">&#x2715;</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty">Tu carrito está vacío</div>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span class="cart-total-label">TOTAL ESTIMADO</span>
      <span class="cart-total-value" id="cartTotal">¥0.00</span>
    </div>
    <button class="whatsapp-btn" onclick="sendWhatsApp()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Enviar Pedido por WhatsApp
    </button>
  </div>
</div>
<script>
// Datos inyectados de forma segura via doble JSON.stringify
const PRODUCTOS = JSON.parse("[]");
const USD_RATE = 0.145321;
let cart = [];
let currentProduct = null;
function formatUSD(cny) { return '$' + (cny * USD_RATE).toFixed(2); }
function showCatalog() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('catalog').classList.add('active');
  renderProducts();
}
function renderProducts() {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = PRODUCTOS.map((p, i) => {
    const noImg = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect fill="#f5f0ea" width="200" height="200"/><text x="50%" y="50%" fill="#ccc" text-anchor="middle" dy=".3em">Sin imagen</text></svg>');
    return '<div class="product-card" onclick="openModal(' + i + ')">' +
      '<div class="product-img-wrap">' +
      '<img class="product-img" src="' + (p.imagen||'') + '" alt="" loading="lazy" onerror="this.src='' + noImg + ''">' +
      (p.variants.length > 0 ? '<div class="variants-badge">' + p.variants.length + ' variantes</div>' : '') +
      '</div>' +
      '<div class="product-info">' +
      '<div class="product-name">' + p.titulo + '</div>' +
      '<div class="product-price">¥' + p.price_range + ' <span>/ ' + formatUSD(p.precio) + '</span></div>' +
      (p.moq > 0 ? '<div class="product-moq">MOQ: ' + p.moq + ' unidades</div>' : '') +
      '</div>' +
      '<div class="product-footer"><span class="view-variants-btn">' + (p.variants.length > 0 ? 'Ver variantes' : 'Ver detalle') + '</span></div>' +
      '</div>';
  }).join('');
}
function openModal(idx) {
  currentProduct = PRODUCTOS[idx];
  const p = currentProduct;
  document.getElementById('modalTitle').textContent = p.titulo;
  document.getElementById('modalImg').src = p.imagen;
  document.getElementById('modalDesc').textContent = p.titulo;
  document.getElementById('modalPrice').textContent = '¥' + p.price_range + '  /  ' + formatUSD(p.precio) + ' USD';
  document.getElementById('modalMoq').textContent = p.moq > 0 ? 'MOQ: ' + p.moq + ' unidades' : '';
  const grid = document.getElementById('variantsGrid');
  if (p.variants.length === 0) {
    grid.innerHTML = '<div class="no-variants-msg">Este producto no tiene variantes disponibles.</div>';
  } else {
    grid.innerHTML = p.variants.map((v, i) => {
      return '<div class="variant-card ' + (!v.available ? 'out-of-stock' : '') + '" id="variant-' + i + '" onclick="selectVariant(' + i + ')">' +
        '<img class="variant-img" src="' + (v.image || p.imagen) + '" alt="" loading="lazy" onerror="this.src='' + (p.imagen||'') + ''">' +
        '<div class="variant-info">' +
        '<div class="variant-code">' + v.code + '</div>' +
        '<div class="variant-price">¥' + v.price + ' / ' + formatUSD(v.price) + '</div>' +
        '<div class="variant-stock ' + (v.stock < 20 && v.stock > 0 ? 'low' : '') + '">' + (v.available ? (v.stock < 20 ? '⚠ Stock: ' + v.stock : 'Stock: ' + v.stock) : '✕ Sin stock') + '</div>' +
        (v.available ? '<div class="variant-qty"><button class="qty-btn" onclick="changeQty(event,' + i + ',-1)">−</button><input class="qty-input" type="number" id="qty-' + i + '" value="0" min="0" max="' + v.stock + '"><button class="qty-btn" onclick="changeQty(event,' + i + ',1)">+</button></div>' : '') +
        '</div></div>';
    }).join('');
  }
  document.getElementById('modalOverlay').classList.add('active');
}
function selectVariant(i) {
  const card = document.getElementById('variant-' + i);
  if (card.classList.contains('out-of-stock')) return;
  card.classList.toggle('selected');
  const qtyInput = document.getElementById('qty-' + i);
  if (qtyInput && parseInt(qtyInput.value) === 0) qtyInput.value = 1;
}
function changeQty(e, i, delta) {
  e.stopPropagation();
  const input = document.getElementById('qty-' + i);
  const newVal = Math.max(0, parseInt(input.value || 0) + delta);
  input.value = newVal;
  const card = document.getElementById('variant-' + i);
  if (newVal > 0) card.classList.add('selected');
  else card.classList.remove('selected');
}
function addSelectedToCart() {
  if (!currentProduct) return;
  let added = 0;
  currentProduct.variants.forEach(function(v, i) {
    const input = document.getElementById('qty-' + i);
    if (!input) return;
    const qty = parseInt(input.value);
    if (qty > 0 && v.available) {
      const existing = cart.find(function(c) { return c.code === v.code && c.productId === currentProduct.offerId; });
      if (existing) existing.qty = qty;
      else cart.push({ productId: currentProduct.offerId, productName: currentProduct.titulo, code: v.code, price: v.price, qty: qty, image: v.image || currentProduct.imagen });
      added++;
    }
  });
  if (added > 0) { closeModalDirect(); renderCart(); toggleCart(); }
}
function renderCart() {
  const container = document.getElementById('cartItems');
  document.getElementById('cartCount').textContent = cart.reduce(function(s, i) { return s + i.qty; }, 0);
  if (cart.length === 0) {
    container.innerHTML = '<div class="cart-empty">Tu carrito está vacío</div>';
    document.getElementById('cartTotal').textContent = '¥0.00';
    return;
  }
  let total = 0;
  container.innerHTML = cart.map(function(item, i) {
    total += item.price * item.qty;
    return '<div class="cart-item">' +
      '<img class="cart-item-img" src="' + item.image + '" alt="" onerror="this.style.display='none'">' +
      '<div class="cart-item-info">' +
      '<div class="cart-item-code">' + item.code + ' × ' + item.qty + '</div>' +
      '<div class="cart-item-product">' + item.productName + '</div>' +
      '<div class="cart-item-price">¥' + (item.price * item.qty).toFixed(2) + ' / ' + formatUSD(item.price * item.qty) + '</div>' +
      '</div>' +
      '<button class="cart-item-remove" onclick="removeFromCart(' + i + ')">✕</button>' +
      '</div>';
  }).join('');
  document.getElementById('cartTotal').textContent = '¥' + total.toFixed(2) + ' / ' + formatUSD(total);
}
function removeFromCart(i) { cart.splice(i, 1); renderCart(); }
function sendWhatsApp() {
  if (cart.length === 0) return;
  let msg = '🛒 *PEDIDO KAIZEN*

';
  let total = 0;
  cart.forEach(function(item) {
    msg += '• *' + item.code + '* × ' + item.qty + ' = ¥' + (item.price * item.qty).toFixed(2) + '
';
    msg += '  _' + item.productName.slice(0, 40) + '_

';
    total += item.price * item.qty;
  });
  msg += '
💰 *Total: ¥' + total.toFixed(2) + ' / ' + formatUSD(total) + '*';
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}
function toggleCart() { document.getElementById('cartPanel').classList.toggle('active'); }
function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('active'); currentProduct = null; }
</script>
